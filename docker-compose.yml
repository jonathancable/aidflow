services:
  postgres:
    image: postgres:15-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER:     aidflow
      POSTGRES_PASSWORD: aidflow_dev
      POSTGRES_DB:       aidflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aidflow']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    ports:
      - '4000:4000'
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages:/app/packages
      - api_prisma_generated:/app/apps/api/src/generated
    env_file:
      - ./apps/api/.env.local
    environment:
      DATABASE_URL: postgresql://aidflow:aidflow_dev@postgres:5432/aidflow
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    command: /app/node_modules/.bin/tsx watch --tsconfig tsconfig.json src/index.ts

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    ports:
      - '5173:5173'
    volumes:
      - ./apps/web/src:/app/apps/web/src
      - ./packages:/app/packages
    environment:
      VITE_API_URL: http://api:4000
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  api_prisma_generated: